name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  helm-lint:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "3.14.0"

      - name: Lint microservice chart (default values)
        run: helm lint charts/microservice

      - name: Lint redis chart (default values)
        run: helm lint charts/redis

      - name: Lint microservice chart with each service values file
        run: |
          for f in values/*-values.yaml; do
            chart="charts/microservice"
            if [[ "$f" == *"redis"* ]]; then
              chart="charts/redis"
            fi
            echo "Linting $chart with $f"
            helm lint "$chart" -f "$f"
          done

  validate-kubernetes-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate config.yaml syntax
        run: kubectl apply --dry-run=client --validate=false -f config.yaml
